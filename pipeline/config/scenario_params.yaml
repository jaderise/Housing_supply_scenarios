hh_formation:
  very_low:
    label: "Strong decline (-10%/yr)"
    adjustment: 0.90
    description: "Household formation rate declining 10% per year — severe demand contraction"
  low:
    label: "Moderate decline (-5%/yr)"
    adjustment: 0.95
    description: "Household formation rate declining 5% per year"
  baseline:
    label: "Trend (0%/yr)"
    adjustment: 1.00
    description: "Household formation continues at recent trend rate"
  high:
    label: "Moderate growth (+5%/yr)"
    adjustment: 1.05
    description: "Household formation rate growing 5% per year"
  very_high:
    label: "Strong growth (+10%/yr)"
    adjustment: 1.10
    description: "Household formation rate growing 10% per year — strong demand expansion"

demolition:
  very_low:
    label: "0.10%/yr"
    rate: 0.0010
    description: "Minimal stock loss — newer housing stock, little demolition"
  low:
    label: "0.15%/yr"
    rate: 0.0015
    description: "Lower end of academic estimates"
  baseline:
    label: "0.25%/yr"
    rate: 0.0025
    description: "Industry standard; consistent with Freddie Mac methodology"
  high:
    label: "0.30%/yr"
    rate: 0.0030
    description: "Above average stock loss due to aging inventory"
  very_high:
    label: "0.35%/yr"
    rate: 0.0035
    description: "Upper bound; reflects aging Sun Belt stock and climate risk"

migration:
  strong_decline:
    label: "Strong decline (-50%)"
    adjustment: 0.50
    description: "Net migration falls to half of current pace"
  moderate_decline:
    label: "Moderate decline (-25%)"
    adjustment: 0.75
    description: "Net migration slows by 25% from current pace"
  flat:
    label: "Current pace (0%)"
    adjustment: 1.00
    description: "Net domestic migration stays at recent 2022-2024 level"
  moderate_growth:
    label: "Moderate growth (+25%)"
    adjustment: 1.25
    description: "Net migration accelerates 25% above current pace"
  strong_growth:
    label: "Strong growth (+50%)"
    adjustment: 1.50
    description: "Net migration accelerates 50% above current pace"

income_growth:
  negative:
    label: "-2%/yr"
    rate: -0.02
    description: "Real incomes declining — recession or persistent inflation eroding wages"
  stagnant:
    label: "0%/yr"
    rate: 0.00
    description: "Real incomes flat — wage growth matches inflation"
  baseline:
    label: "+2%/yr"
    rate: 0.02
    description: "Historical average real income growth"
  strong:
    label: "+4%/yr"
    rate: 0.04
    description: "Tight labor market with above-trend wage gains"
  very_strong:
    label: "+6%/yr"
    rate: 0.06
    description: "Exceptional wage growth — sustained labor shortage"

borrowing_environment:
  very_tight:
    label: "+150bp"
    rate_shock: 0.015
    ltv_adjustment: 0.85
    description: "Sharp credit tightening: rates rise 150bp, stricter lending"
  tight:
    label: "+75bp"
    rate_shock: 0.0075
    ltv_adjustment: 0.92
    description: "Moderate tightening: rates rise 75bp"
  baseline:
    label: "Current"
    rate_shock: 0.0
    ltv_adjustment: 1.00
    description: "Current mortgage rate and lending standards persist"
  loose:
    label: "-75bp"
    rate_shock: -0.0075
    ltv_adjustment: 1.08
    description: "Moderate easing: rates fall 75bp"
  very_loose:
    label: "-150bp"
    rate_shock: -0.015
    ltv_adjustment: 1.15
    description: "Aggressive easing: rates fall 150bp, loosened credit — refi boom"

demographic_shift:
  shrinking:
    label: "Shrinking (-4%/yr)"
    hh_adjustment: 0.85
    description: "Sharp decline in prime homebuyer cohort (25-44) — aging population dominates"
  slow:
    label: "Slow growth (-2%/yr)"
    hh_adjustment: 0.92
    description: "Below-trend growth in prime homebuyer age group"
  baseline:
    label: "Trend (0%/yr)"
    hh_adjustment: 1.00
    description: "Current age distribution trends continue"
  growing:
    label: "Above trend (+2%/yr)"
    hh_adjustment: 1.08
    description: "Above-trend growth in prime homebuyer cohort"
  surging:
    label: "Surging (+4%/yr)"
    hh_adjustment: 1.15
    description: "Peak millennial + Gen-Z family formation — strong first-time buyer wave"

horizon:
  values: [1, 2, 3, 5, 7, 10]
  labels:
    1: "1 Year"
    2: "2 Years"
    3: "3 Years"
    5: "5 Years"
    7: "7 Years"
    10: "10 Years"
